<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正經人 老闆查詢系統</title>
<style>
:root {
  --primary:#B85C2A;--primary-light:#D4845A;--primary-dark:#8A3F18;
  --bg:#FAF7F3;--surface:#FFFFFF;--border:#E5D8CC;
  --text:#1E140A;--text2:#7A5C40;--text3:#B09880;
  --success:#2E7D4F;--success-light:#E6F4EC;
  --danger:#B02020;--danger-light:#FDEAEA;
  --warn:#C06010;--warn-light:#FEF3E2;
  --gold:#C8973A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'PingFang TC','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--primary);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;}
.header h1{font-size:20px;font-weight:800;letter-spacing:1px;}
.header sub{font-size:12px;opacity:.8;margin-top:2px;display:block;}
.container{max-width:900px;margin:0 auto;padding:20px 16px;}
.upload-zone{background:var(--surface);border:2.5px dashed var(--border);border-radius:16px;padding:48px 24px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:24px;}
.upload-zone:hover{border-color:var(--primary);background:#FFF8F4;}
.upload-zone.drag{border-color:var(--primary);background:#FFF8F4;}
.upload-icon{font-size:48px;margin-bottom:12px;}
.upload-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;}
.upload-sub{font-size:13px;color:var(--text2);}
#file-input{display:none;}
.btn{display:inline-block;padding:12px 24px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--text2);}
.dashboard{display:none;}
.section-title{font-size:16px;font-weight:800;color:var(--primary-dark);margin:24px 0 10px;border-left:4px solid var(--primary);padding-left:10px;}
.card{background:var(--surface);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.stat{background:var(--surface);border-radius:14px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.stat-val{font-size:26px;font-weight:800;color:var(--primary);}
.stat-label{font-size:12px;color:var(--text2);margin-top:2px;}
.log-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
.log-row:last-child{border-bottom:none;}
.log-time{color:var(--text3);font-size:12px;min-width:60px;padding-top:1px;}
.log-desc{flex:1;color:var(--text);}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-right:4px;}
.tag-sale{background:#FFF3E0;color:#E65100;}
.tag-clock{background:var(--success-light);color:var(--success);}
.tag-taste{background:#E8F4FF;color:#1565C0;}
.tag-refund{background:var(--danger-light);color:var(--danger);}
.tag-adj{background:#F3E5F5;color:#6A1B9A;}
.tag-io{background:#E0F2F1;color:#00695C;}
.clock-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.clock-card{background:var(--surface);border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.clock-name{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--primary-dark);}
.clock-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);}
.clock-row:last-child{border-bottom:none;}
.clock-in{color:var(--success);}
.clock-out{color:var(--danger);}
.stock-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.stock-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg);border-radius:8px;font-size:13px;}
.stock-name{color:var(--text);}
.stock-qty{font-weight:700;}
.stock-ok{color:var(--success);}
.stock-low{color:var(--warn);}
.stock-zero{color:var(--danger);}
.empty{text-align:center;color:var(--text3);font-size:13px;padding:20px;}
.export-date{font-size:12px;color:var(--text3);text-align:right;margin-bottom:16px;}
.rank-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.rank-row:last-child{border-bottom:none;}
.rank-num{font-size:16px;font-weight:800;color:var(--primary);min-width:24px;}
.rank-name{flex:1;}
.rank-val{font-weight:700;color:var(--primary-dark);}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:8px;}
.alert-warn{background:var(--warn-light);color:var(--warn);}
.alert-danger{background:var(--danger-light);color:var(--danger);}
.reset-btn{margin-top:24px;width:100%;}
@media(max-width:500px){
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .clock-grid{grid-template-columns:1fr;}
  .stock-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>👔 正經人 老闆查詢</h1>
    <sub>上傳備份檔案查看當日報表</sub>
  </div>
</div>
<div class="container">
  <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
    <div class="upload-icon">📂</div>
    <div class="upload-title">點此上傳備份檔案</div>
    <div class="upload-sub">或將 .json 備份檔拖曳到這裡</div>
    <br>
    <span class="btn btn-primary">選擇檔案</span>
  </div>
  <input type="file" id="file-input" accept=".json" onchange="loadFile(event)">

  <div class="dashboard" id="dashboard">
    <div class="export-date" id="export-date"></div>

    <div class="section-title">📊 今日銷售概況</div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-val" id="d-total">$0</div><div class="stat-label">今日銷售額</div></div>
      <div class="stat"><div class="stat-val" id="d-orders">0</div><div class="stat-label">今日筆數</div></div>
      <div class="stat"><div class="stat-val" id="d-taste">0</div><div class="stat-label">今日試吃</div></div>
    </div>

    <div class="section-title">🏪 通路分拆</div>
    <div class="stat-grid" id="d-channel"></div>

    <div class="section-title">🏆 今日銷售排行</div>
    <div class="card" id="d-rank"><div class="empty">尚無銷售記錄</div></div>

    <div class="section-title">🥮 中秋禮盒預購統計</div>
    <div class="card" id="d-moon"><div class="empty">尚無預購記錄</div></div>

    <div class="section-title">📋 欠貨訂單</div>
    <div class="card" id="d-backorder"><div class="empty">目前無欠貨訂單</div></div>

    <div class="section-title">👋 打卡記錄</div>
    <div class="clock-grid" id="d-clock"></div>

    <div class="section-title">📦 目前庫存</div>
    <div id="d-stock-alerts"></div>
    <div class="card"><div class="stock-grid" id="d-stock"></div></div>

    <div class="section-title">📋 今日完整記錄</div>
    <div class="card" id="d-logs"><div class="empty">尚無記錄</div></div>

    <button class="btn btn-ghost reset-btn" onclick="resetDashboard()">🔄 重新上傳其他備份</button>
  </div>
</div>

<script>
const BASE_ITEMS = {
  'tofu-99-yuan':    {name:'正經人豆腐餅 原味',       price:99,  unit:'包',group:'99'},
  'tofu-99-jiao':    {name:'正經人豆腐餅 椒鹽',       price:99,  unit:'包',group:'99'},
  'diao-149-yuan':   {name:'鯛魚豆腐餅 原味',         price:149, unit:'包',group:'149'},
  'diao-149-mei':    {name:'鯛魚豆腐餅 梅粉',         price:149, unit:'包',group:'149'},
  'gui-149-jiao':    {name:'鮭魚豆腐餅 椒鹽',         price:149, unit:'包',group:'149'},
  'gui-149-yuan':    {name:'鮭魚豆腐餅 原味',         price:149, unit:'包',group:'149'},
  'gui-149-jie':     {name:'鮭魚豆腐餅 芥末',         price:149, unit:'包',group:'149'},
  'gift-meat-10':    {name:'肉脯餅禮盒(10入)綜合',    price:550, unit:'盒',group:'gift'},
  'gift-pine-10':    {name:'鳳梨酥禮盒(10入)綜合',    price:500, unit:'盒',group:'gift'},
  'gift-pine-5-mei': {name:'鳳梨酥禮盒(5入)梅肉',    price:250, unit:'盒',group:'gift'},
  'gift-pine-5-q':   {name:'鳳梨酥禮盒(5入)Q心',     price:250, unit:'盒',group:'gift'},
  'gift-sun-6':      {name:'太陽餅6入綜合禮盒',        price:270, unit:'盒',group:'gift'},
  'gift-bret-6':     {name:'布列塔尼6入綜合禮盒',      price:300, unit:'盒',group:'gift'},
  'gift-choc-bret':  {name:'巧克力布列塔尼6入禮盒',    price:300, unit:'盒',group:'gift'},
  'moon-xing':       {name:'星饗禮盒',   price:567, unit:'盒',group:'moon'},
  'moon-guo':        {name:'菓藏禮盒',   price:540, unit:'盒',group:'moon'},
  'moon-cha':        {name:'拾茶禮盒',   price:405, unit:'盒',group:'moon'},
  'moon-zui':        {name:'醉焰禮盒',   price:400, unit:'盒',group:'moon'},
  'moon-juan':       {name:'絹月禮盒',   price:495, unit:'盒',group:'moon'},
  'moon-egg-jiu':    {name:'酒香蛋黃酥', price:75,  unit:'顆',group:'moon'},
  'moon-egg-ma':     {name:'麻奶蛋黃酥', price:75,  unit:'顆',group:'moon'},
};

function dragOver(e){e.preventDefault();document.getElementById('upload-zone').classList.add('drag');}
function dragLeave(){document.getElementById('upload-zone').classList.remove('drag');}
function dropFile(e){e.preventDefault();dragLeave();const f=e.dataTransfer.files[0];if(f)readFile(f);}
function loadFile(e){const f=e.target.files[0];if(f)readFile(f);}
function readFile(f){
  const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);renderDashboard(d);}catch{alert('檔案格式錯誤，請確認是否為正確的備份檔。');}};
  r.readAsText(f);
}

function renderDashboard(d) {
  document.getElementById('upload-zone').style.display='none';
  document.getElementById('dashboard').style.display='block';

  const ITEMS = {...BASE_ITEMS};
  if(d.customItems) Object.entries(d.customItems).forEach(([k,v])=>ITEMS[k]=v);
  if(d.baseOverrides) Object.entries(d.baseOverrides).forEach(([k,v])=>{if(ITEMS[k])Object.assign(ITEMS[k],v);});

  // Export date
  const ed = new Date(d.exportDate);
  document.getElementById('export-date').textContent = '備份時間：'+ed.toLocaleString('zh-TW');

  const today = d.exportDate.slice(0,10);
  const logs = d.allLogs || [];
  const todayLogs = logs.filter(l=>l.date===today);

  // 從 salesRecords 取今日銷售（更準確）
  const salesKey = 'jzr_sales_'+today;
  const todaySales = (d.salesRecords&&d.salesRecords[salesKey]) || {total:0,orders:0,items:{},retail:0,emp:0,app:0};
  const totalAmt = todaySales.total||0;
  const totalOrders = todaySales.orders||0;

  document.getElementById('d-total').textContent='$'+totalAmt.toLocaleString();
  document.getElementById('d-orders').textContent=totalOrders;

  // 試吃
  const tasteKey='jzr_taste_'+today;
  const tasteTotal=(d.salesRecords&&d.salesRecords[tasteKey]?.total)||0;
  document.getElementById('d-taste').textContent=tasteTotal;

  // 通路分拆（從 log 推算）
  let retail=todaySales.retail||0, emp=todaySales.emp||0, app=todaySales.app||0;
  if(!retail&&!emp&&!app&&totalAmt>0){
    todayLogs.filter(l=>l.type==='sale'||l.type==='factory'||l.type==='backorder').forEach(l=>{
      const amtMatches=l.desc.match(/\$[\d,]+/g);
      const amt=amtMatches?parseInt(amtMatches[amtMatches.length-1].replace(/[$,]/g,'')):0;
      if(l.desc.includes('[員購]'))emp+=amt;
      else if(l.desc.includes('[APP]'))app+=amt;
      else retail+=amt;
    });
  }
  document.getElementById('d-channel').innerHTML=
    `<div class="stat"><div class="stat-val" style="font-size:18px">$${retail.toLocaleString()}</div><div class="stat-label">一般零售</div></div>`+
    `<div class="stat"><div class="stat-val" style="font-size:18px">$${emp.toLocaleString()}</div><div class="stat-label">員購</div></div>`+
    `<div class="stat"><div class="stat-val" style="font-size:18px">$${app.toLocaleString()}</div><div class="stat-label">百貨APP</div></div>`;

  // 銷售排行（餅乾/禮盒/中秋分開）
  const itemTotals=todaySales.items||{};
  const medals=['🥇','🥈','🥉'];
  const makeRank=(keys,unit)=>{
    const rows=keys.filter(k=>itemTotals[k]>0&&ITEMS[k]).sort((a,b)=>(itemTotals[b]||0)-(itemTotals[a]||0));
    if(!rows.length) return '<div class="empty">尚無資料</div>';
    return rows.map((k,i)=>`<div class="rank-row"><div class="rank-num">${medals[i]||i+1}</div><div class="rank-name">${ITEMS[k].name}</div><div class="rank-val">${itemTotals[k]} ${ITEMS[k].unit}</div></div>`).join('');
  };
  const cookieKeys=Object.keys(ITEMS).filter(k=>ITEMS[k].group==='99'||ITEMS[k].group==='149');
  const giftKeys=Object.keys(ITEMS).filter(k=>ITEMS[k].group==='gift');
  const moonKeys=Object.keys(ITEMS).filter(k=>ITEMS[k].group==='moon');
  document.getElementById('d-rank').innerHTML=
    '<div style="font-size:12px;font-weight:700;color:#7A5C40;margin:6px 0 4px">🥚 餅乾系列</div>'+makeRank(cookieKeys)+
    '<div style="font-size:12px;font-weight:700;color:#7A5C40;margin:14px 0 4px">🎁 禮盒系列</div>'+makeRank(giftKeys)+
    (moonKeys.some(k=>itemTotals[k]>0)?'<div style="font-size:12px;font-weight:700;color:#B8860B;margin:14px 0 4px">🥮 中秋禮盒</div>'+makeRank(moonKeys):'');

  // 中秋預購統計（全部日期加總）
  const moonTotals={};
  moonKeys.forEach(k=>moonTotals[k]=0);
  if(d.salesRecords){
    Object.entries(d.salesRecords).forEach(([key,s])=>{
      if(key.startsWith('jzr_sales_')&&s.items){
        moonKeys.forEach(k=>{if(s.items[k])moonTotals[k]+=s.items[k];});
      }
    });
  }
  const moonTotal=moonKeys.reduce((s,k)=>s+moonTotals[k],0);
  const moonEl=document.getElementById('d-moon');
  if(moonTotal>0){
    moonEl.innerHTML='<div style="font-size:13px;font-weight:800;color:#B8860B;margin-bottom:8px">總計：'+moonTotal+' 盒</div>'+
      moonKeys.filter(k=>moonTotals[k]>0).sort((a,b)=>moonTotals[b]-moonTotals[a]).map((k,i)=>
        `<div class="rank-row"><div class="rank-num">${medals[i]||i+1}</div><div class="rank-name">${ITEMS[k].name}</div><div class="rank-val">${moonTotals[k]} 盒</div></div>`
      ).join('');
  } else {
    moonEl.innerHTML='<div class="empty">尚無預購記錄</div>';
  }

  // 欠貨訂單
  const backorders=logs.filter(l=>l.type==='backorder'&&!l.cancelled);
  const completedIds=d.salesRecords?.['jzr_backorder_completed']||[];
  const backEl=document.getElementById('d-backorder');
  if(backorders.length){
    backEl.innerHTML=backorders.map(l=>{
      const logIdx=logs.indexOf(l);
      const isDone=completedIds.includes(logIdx);
      const desc=l.desc.replace(/^\[欠貨\]/,'').replace(/\s*\/\s*\$[\d,]+.*$/,'');
      const amtM=l.desc.match(/\$[\d,]+/g);
      const amt=amtM?amtM[amtM.length-1]:'?';
      return `<div class="log-row"><div class="log-time">${l.date}<br>${l.time}</div><div class="log-desc"><span class="tag tag-adj">${isDone?'✅已出貨':'⏳未出貨'}</span> ${desc} ${amt}</div></div>`;
    }).join('');
  } else {
    backEl.innerHTML='<div class="empty">目前無欠貨訂單</div>';
  }

  // 打卡記錄
  const staffList = d.staffList||['店員A','店員B'];
  const clockEl=document.getElementById('d-clock');
  const todayClocks=(d.clockLogs||[]).filter(c=>c.date===today);
  clockEl.innerHTML=staffList.map(s=>{
    const sc=todayClocks.filter(c=>c.staff===s);
    const rows=sc.length?sc.map(c=>`<div class="clock-row"><span class="${c.type==='in'?'clock-in':'clock-out'}">${c.type==='in'?'▶ 上班':'■ 下班'}</span><span>${c.time}</span></div>`).join(''):'<div style="font-size:12px;color:var(--text3);padding:4px 0">今日未打卡</div>';
    return `<div class="clock-card"><div class="clock-name">👤 ${s}</div>${rows}</div>`;
  }).join('');

  // 庫存
  const stock=d.stock||{};
  const settings=d.settings||{lowTofu:10,lowGift:3};
  const alertEl=document.getElementById('d-stock-alerts');
  const stockEl=document.getElementById('d-stock');
  let alerts='';
  const allKeys=Object.keys(ITEMS);
  stockEl.innerHTML=allKeys.map(k=>{
    const v=ITEMS[k]; const s=stock[k]??0;
    if(v.group==='moon') return ''; // 中秋禮盒預購制，不顯示庫存
    const low=v.group==='gift'?(settings.lowGift||3):(v.low||settings.lowTofu||10);
    let cls='stock-ok';
    if(s===0){cls='stock-zero';alerts+=`<div class="alert alert-danger">❌ ${v.name} — 已售完</div>`;}
    else if(s<=low){cls='stock-low';alerts+=`<div class="alert alert-warn">⚠ ${v.name} — 低庫存 ${s}${v.unit}</div>`;}
    return `<div class="stock-item"><span class="stock-name">${v.name}</span><span class="stock-qty ${cls}">${s} ${v.unit}</span></div>`;
  }).join('');
  alertEl.innerHTML=alerts||'<div style="font-size:13px;color:var(--success);padding:6px 0">✅ 庫存狀況正常</div>';

  // 今日完整記錄
  const logEl=document.getElementById('d-logs');
  const tagMap={sale:'tag-sale',clock:'tag-clock',taste:'tag-taste',refund:'tag-refund',adj:'tag-adj',in:'tag-io',out:'tag-io',factory:'tag-sale',backorder:'tag-adj'};
  const labelMap={sale:'銷售',clock:'打卡',taste:'試吃',refund:'退貨',adj:'調整',in:'入庫',out:'出庫',factory:'工廠直發',backorder:'欠貨'};
  logEl.innerHTML=todayLogs.length
    ?[...todayLogs].reverse().map(l=>`<div class="log-row"><div class="log-time">${l.time||''}</div><div class="log-desc"><span class="tag ${tagMap[l.type]||''}">${labelMap[l.type]||l.type}</span>${l.staff?` <span style="font-size:11px;color:var(--text3)">[${l.staff}]</span>`:''} ${l.desc||''}</div></div>`).join('')
    :'<div class="empty">今日尚無記錄</div>';
}

function resetDashboard(){
  document.getElementById('upload-zone').style.display='block';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('file-input').value='';
}
</script>
</body>
</html>
